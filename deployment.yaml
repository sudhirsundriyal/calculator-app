apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculator-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calculator-app
  template:
    metadata:
      labels:
        app: calculator-app
    spec:
      containers:
      - name: calculator
        image: <YOUR_DOCKER_USERNAME>/calculator-app:latest
        args: ["10", "20"] # optional: override default numbers
